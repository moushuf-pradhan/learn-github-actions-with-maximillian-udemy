name: 02 starting project
on: push
jobs:
    test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 02-starting-project

        steps:
            - name: Get code
              uses: actions/checkout@v6
            - name: Install NodeJS
              uses: actions/setup-node@v6
              with:
                  node-version: 24
            - name: Install dependencies
              run: npm ci
            - name: Run tests
              run: npm test
